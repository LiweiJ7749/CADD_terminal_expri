services:
  rosetta:
    image: rosettacommons/rosetta:ml-420
    platform: linux/amd64
    working_dir: /work
    volumes:
      - .:/work
    environment:
      ROSETTA3_DB: /usr/local/database
    stdin_open: true
    tty: true
    command: bash

  zdock:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: zdock302:local
    working_dir: /work/zdock3.0.2_linux_x64
    volumes:
      - .:/work
    stdin_open: true
    tty: true
    command: bash
